name: Sync mirror to a29-erp

on:
  workflow_dispatch:
    inputs:
      preserve_theme:
        description: 'Manter paleta/cores do A29 (tailwind + CSS tokens)'
        required: false
        default: true
        type: boolean

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Pack UI mirror
        run: npm run mirror:pack

      - name: Clone a29-erp
        env:
          A29_ERP_GIT_URL: ${{ secrets.A29_ERP_GIT_URL }}
          A29_ERP_DEPLOY_TOKEN: ${{ secrets.A29_ERP_DEPLOY_TOKEN }}
        run: |
          if [ -z "$A29_ERP_GIT_URL" ] || [ -z "$A29_ERP_DEPLOY_TOKEN" ]; then
            echo "::error::Define os secrets A29_ERP_GIT_URL e A29_ERP_DEPLOY_TOKEN no repositório varejosync."
            exit 1
          fi
          REPO_PATH="${A29_ERP_GIT_URL#https://github.com/}"
          REPO_PATH="${REPO_PATH#http://github.com/}"
          REPO_PATH="${REPO_PATH%.git}"
          git clone --depth 1 "https://x-access-token:${A29_ERP_DEPLOY_TOKEN}@github.com/${REPO_PATH}.git" /tmp/a29-erp

      - name: Push mirror (preserve A29 theme)
        run: |
          ARGS="/tmp/a29-erp"
          if [ "${{ inputs.preserve_theme }}" != "true" ]; then
            ARGS="$ARGS --no-preserve-theme"
          fi
          npm run mirror:push -- $ARGS

      - name: Commit and push branch on a29-erp
        working-directory: /tmp/a29-erp
        env:
          A29_ERP_DEPLOY_TOKEN: ${{ secrets.A29_ERP_DEPLOY_TOKEN }}
          A29_ERP_GIT_URL: ${{ secrets.A29_ERP_GIT_URL }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet legacy/varejosync; then
            echo "Sem alterações em legacy/varejosync."
            exit 0
          fi
          SHA=$(git -C "$GITHUB_WORKSPACE" rev-parse --short HEAD)
          BRANCH="sync/varejosync-ui-${SHA}"
          REPO_PATH="${A29_ERP_GIT_URL#https://github.com/}"
          REPO_PATH="${REPO_PATH%.git}"
          git checkout -b "$BRANCH"
          git add legacy/varejosync
          git commit -m "chore(legacy): sync varejosync UI snapshot (${SHA})"
          git push "https://x-access-token:${A29_ERP_DEPLOY_TOKEN}@github.com/${REPO_PATH}.git" "$BRANCH"
          echo "Branch criada: $BRANCH — abre PR no a29-erp para rever e fundir."
