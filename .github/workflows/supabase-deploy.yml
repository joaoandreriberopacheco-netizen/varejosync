# Deploy Supabase — migrações SQL + Edge Functions.
#
# Disparo:
#   1. Manual: Actions → "Supabase Deploy" → Run workflow
#   2. Push em main quando mudam ficheiros em supabase/**
#   3. Agente Cloud: gh workflow run supabase-deploy.yml
#
# Secrets (Settings → Secrets and variables → Actions):
#   DATABASE_URL              — Connection string Postgres (pooler recomendado)
#   SUPABASE_ACCESS_TOKEN     — Personal Access Token (Account → Access Tokens)
#   SUPABASE_PROJECT_REF      — opcional se VITE_SUPABASE_URL estiver definido
#   VITE_SUPABASE_URL         — opcional (extrai project ref da URL)

name: Supabase Deploy

concurrency:
  group: supabase-deploy
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      migrations:
        description: 'Aplicar migrações SQL pendentes'
        type: boolean
        default: true
      functions:
        description: 'Deploy Edge Functions'
        type: boolean
        default: true
      dry_run:
        description: 'Apenas listar o que seria feito (não altera nada)'
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - 'scripts/apply-supabase-migrations.mjs'
      - 'scripts/deploy-supabase*.mjs'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validar secrets
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "Dry-run — validação mínima."
            exit 0
          fi
          if [ -z "${DATABASE_URL:-}" ]; then
            echo "::error::Secret DATABASE_URL em falta."
            exit 1
          fi
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::Secret SUPABASE_ACCESS_TOKEN em falta."
            exit 1
          fi
          echo "OK: secrets presentes."

      - name: Aplicar migrações SQL
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.migrations != false && inputs.dry_run != true) }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run db:apply-migrations

      - name: Dry-run migrações
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true && inputs.migrations != false }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run db:apply-migrations -- --dry-run

      - name: Deploy Edge Functions
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.functions != false && inputs.dry_run != true) }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        run: npm run supabase:deploy:functions

      - name: Dry-run Edge Functions
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == true && inputs.functions != false }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        run: npm run supabase:deploy:functions -- --dry-run
