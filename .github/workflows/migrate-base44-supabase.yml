# Migração Base44 → Supabase (usa secrets do repositório — não colar credenciais no YAML).
#
# Só disparo manual (workflow_dispatch): dry-run ou migração/resync.
#
# Secrets necessários (Settings → Secrets and variables → Actions):
#   DATABASE_URL
#   VITE_BASE44_APP_ID
# Autenticação Base44 (pelo menos uma):
#   BASE44_ACCESS_TOKEN   (JWT) e/ou
#   BASE44_API_KEY        (header api_key, ex. P38 REST)
# Opcionais (igual ao script migrate-base44-to-supabase.mjs):
#   VITE_BASE44_BACKEND_URL   (P38: https://p38.base44.app ; default https://base44.app se omitido)
#   MIGRATE_DNS_SERVERS
#   MIGRATE_PG_HOST
#   MIGRATE_PG_SSL_INSECURE
#   MIGRATE_ONLY_ENTITIES
#   MIGRATE_ROWS_PER_COMMIT
#
# Disparo manual: Actions → "Migrate Base44 to Supabase" → Run workflow.
# Resync: ver docs/migration/BASE44_TO_SUPABASE_GITHUB.md (voltar a correr com dry_run: false).

name: Migrate Base44 to Supabase

concurrency:
  group: migrate-base44-to-supabase
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Apenas contar linhas (não escreve no Postgres)'
        type: boolean
        default: true
  push:
    branches: [main]
    paths:
      - '.github/trigger-migrate-base44-supabase'

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      # Até ~2026-06-02 os runners usam Node 20 por defeito nos actions JS; isto força Node 24 (changelog GitHub).
      # Depois dessa data o default passa a Node 24 — esta linha pode ser removida se não precisares de pin explícito.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validar secrets obrigatórios
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          VITE_BASE44_APP_ID: ${{ secrets.VITE_BASE44_APP_ID }}
          BASE44_ACCESS_TOKEN: ${{ secrets.BASE44_ACCESS_TOKEN }}
          BASE44_API_KEY: ${{ secrets.BASE44_API_KEY }}
        run: |
          set -e
          ok=1
          if [ -z "${DATABASE_URL:-}" ]; then echo "::error::Secret DATABASE_URL vazio ou não definido. Copia a URI do Transaction pooler em Supabase → Database."; ok=0; fi
          if [ -z "${VITE_BASE44_APP_ID:-}" ]; then echo "::error::Secret VITE_BASE44_APP_ID vazio ou não definido."; ok=0; fi
          if [ -z "${BASE44_API_KEY:-}" ] && [ -z "${BASE44_ACCESS_TOKEN:-}" ]; then
            echo "::error::Define BASE44_API_KEY ou BASE44_ACCESS_TOKEN (pelo menos um)."
            ok=0
          fi
          if [ "$ok" != 1 ]; then exit 1; fi
          echo "OK: secrets obrigatórios presentes (valores não listados)."

      # Só quando não é dry-run (`!inputs.dry_run` é o padrão GitHub para boolean no dispatch).
      - name: Aplicar migrações SQL (schema Supabase)
        if: ${{ github.event_name == 'push' || !inputs.dry_run }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run db:apply-migrations

      - name: Run migration
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BASE44_ACCESS_TOKEN: ${{ secrets.BASE44_ACCESS_TOKEN }}
          BASE44_API_KEY: ${{ secrets.BASE44_API_KEY }}
          VITE_BASE44_APP_ID: ${{ secrets.VITE_BASE44_APP_ID }}
          VITE_BASE44_BACKEND_URL: ${{ secrets.VITE_BASE44_BACKEND_URL }}
          MIGRATE_DNS_SERVERS: ${{ secrets.MIGRATE_DNS_SERVERS }}
          MIGRATE_PG_HOST: ${{ secrets.MIGRATE_PG_HOST }}
          MIGRATE_PG_SSL_INSECURE: ${{ secrets.MIGRATE_PG_SSL_INSECURE }}
          MIGRATE_ONLY_ENTITIES: ${{ secrets.MIGRATE_ONLY_ENTITIES }}
          MIGRATE_ROWS_PER_COMMIT: ${{ secrets.MIGRATE_ROWS_PER_COMMIT }}
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            npm run migrate:base44-to-supabase -- --dry-run
          else
            npm run migrate:base44-to-supabase
          fi
