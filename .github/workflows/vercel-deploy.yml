# Deploy produção Vercel — build com env vars dos GitHub Secrets (Supabase P38).
#
# Secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN            — https://vercel.com/account/tokens
#   VERCEL_ORG_ID           — Settings → General (Team/Personal ID)
#   VERCEL_PROJECT_ID       — Project → Settings → General
#   VITE_SUPABASE_URL       — https://[ref].supabase.co
#   VITE_SUPABASE_ANON_KEY  — Supabase → Project Settings → API
#
# Opcional:
#   VITE_P38_USE_SUPABASE_AUTH — "true" quando auth Supabase estiver activo

name: Vercel Deploy

concurrency:
  group: vercel-deploy-production
  cancel-in-progress: false

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Validar secrets Vercel + Supabase
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY }}
        run: |
          set -e
          missing=0
          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID VITE_SUPABASE_URL VITE_SUPABASE_ANON_KEY; do
            eval "val=\${$name:-}"
            if [ -z "$val" ]; then
              echo "::error::Secret $name em falta (GitHub → Settings → Secrets → Actions)."
              missing=1
            else
              echo "$name: presente"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo ""
            echo "Vercel: VERCEL_TOKEN em https://vercel.com/account/tokens"
            echo "        VERCEL_ORG_ID / VERCEL_PROJECT_ID no painel do projecto → Settings → General"
            echo "Supabase: VITE_SUPABASE_ANON_KEY (ou SUPABASE_ANON_KEY) na API do projecto P38"
            exit 1
          fi
          echo "OK: secrets presentes."

      - name: Install dependencies
        run: npm ci

      - name: Vercel pull (production)
        run: npx --yes vercel@latest pull --yes --environment=production --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Sincronizar env Supabase no projecto Vercel
        run: bash scripts/sync-vercel-production-env.sh
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY }}
          VITE_P38_USE_SUPABASE_AUTH: ${{ secrets.VITE_P38_USE_SUPABASE_AUTH || 'true' }}

      # O `vercel build` não propaga sempre env do shell ao Vite. `.env.production.local`
      # é lido pelo Vite e garante URL/anon key no bundle (sem isto o app cai no stub Base44).
      - name: Escrever env de produção para o Vite
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY }}
          VITE_P38_USE_SUPABASE_AUTH: ${{ secrets.VITE_P38_USE_SUPABASE_AUTH }}
        run: |
          set -e
          use_auth="${VITE_P38_USE_SUPABASE_AUTH:-true}"
          {
            echo "VITE_P38_PROVIDER=supabase"
            echo "VITE_P38_BYPASS_BASE44=true"
            echo "VITE_SUPABASE_URL=${VITE_SUPABASE_URL}"
            echo "VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}"
            echo "VITE_P38_USE_SUPABASE_AUTH=${use_auth}"
          } > .env.production.local
          echo "OK: .env.production.local criado (sem imprimir valores)."

      - name: Vercel build (production, prebuilt)
        run: npx --yes vercel@latest build --prod --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VITE_P38_PROVIDER: supabase
          VITE_P38_BYPASS_BASE44: 'true'
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY }}
          VITE_P38_USE_SUPABASE_AUTH: ${{ secrets.VITE_P38_USE_SUPABASE_AUTH || 'true' }}

      - name: Verificar Supabase embutido no bundle
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        run: |
          set -e
          ref=$(echo "$VITE_SUPABASE_URL" | sed -E 's#https?://([^.]+)\.supabase\.co.*#\1#')
          found=0
          for f in dist/assets/*.js .vercel/output/static/assets/*.js; do
            [ -f "$f" ] || continue
            if grep -q "$ref" "$f"; then found=1; break; fi
          done
          if [ "$found" -ne 1 ]; then
            echo "::error::Build sem VITE_SUPABASE_URL no bundle (ref esperada: $ref)."
            exit 1
          fi
          echo "OK: bundle contém referência Supabase ($ref)."

      - name: Vercel deploy (production)
        id: deploy
        run: |
          url=$(npx --yes vercel@latest deploy --prebuilt --prod --yes --token "$VERCEL_TOKEN")
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deploy URL: $url"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Verificar produção expõe Supabase no bundle
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        run: |
          set -e
          ref=$(echo "$VITE_SUPABASE_URL" | sed -E 's#https?://([^.]+)\.supabase\.co.*#\1#')
          ok=0
          for attempt in 1 2 3 4 5 6 8 10; do
            html=$(curl -fsSL "https://p-38erp.vercel.app/" || true)
            js=$(echo "$html" | grep -oE '/assets/index-[^"]+\.js' | head -1 || true)
            if [ -n "$js" ] && curl -fsSL "https://p-38erp.vercel.app$js" | grep -q "$ref"; then
              ok=1
              break
            fi
            echo "Tentativa $attempt: produção ainda sem ref Supabase — aguardar propagação…"
            sleep 15
          done
          if [ "$ok" -ne 1 ]; then
            echo "::error::Produção sem ref Supabase ($ref) no bundle após deploy. Desactiva deploy Git nativo do Vercel OU define VITE_SUPABASE_URL/ANON_KEY nas env vars do projecto Vercel."
            exit 1
          fi
          echo "OK: produção contém ref Supabase ($ref)."
